<!-- ========== 商店 ========== -->
<div id="view-shop" class="view-panel">
    <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
            <h4><i class="bi bi-shop me-2 text-warning"></i>商店</h4>
            <p class="text-muted mb-0 small">浏览商品、购买物品、查看订单</p>
        </div>
    </div>

    <ul class="nav nav-tabs mb-3" id="shopTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#shop-items-panel" role="tab">商品列表</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#shop-orders-panel" role="tab">我的订单</button></li>
    </ul>

    <div class="tab-content">

        <!-- 商品列表面板 -->
        <div class="tab-pane fade show active" id="shop-items-panel" role="tabpanel">
            <div class="mb-3">
                <div class="d-flex align-items-center gap-2 flex-wrap">
                    <span class="text-muted small fw-bold me-1">分类：</span>
                    <div id="shop-categories" class="btn-group btn-group-sm" role="group">
                        <button class="btn btn-outline-primary active" onclick="loadShopItems('')">全部</button>
                    </div>
                    <div class="ms-auto input-group input-group-sm w-auto" style="max-width: 220px;">
                        <input type="text" id="shop-search-input" class="form-control" placeholder="搜索商品..." onkeyup="if(event.key==='Enter')searchShopItems()">
                        <button class="btn btn-outline-secondary" onclick="searchShopItems()"><i class="bi bi-search"></i></button>
                    </div>
                </div>
            </div>

            <div id="shop-items-grid" class="row g-3">
                <div class="col-12 text-center text-muted py-5">
                    <i class="bi bi-shop fs-1 d-block mb-2"></i>加载中...
                </div>
            </div>
        </div>

        <!-- 我的订单面板 -->
        <div class="tab-pane fade" id="shop-orders-panel" role="tabpanel">
            <div class="card mb-3">
                <div class="card-body p-2">
                    <div class="d-flex align-items-center gap-2 flex-wrap">
                        <span class="text-muted small fw-bold me-1">状态筛选：</span>
                        <div class="btn-group btn-group-sm" role="group">
                            <button class="btn btn-outline-secondary active" onclick="loadMyOrders('')">全部</button>
                            <button class="btn btn-outline-secondary" onclick="loadMyOrders('pending')">待处理</button>
                            <button class="btn btn-outline-secondary" onclick="loadMyOrders('delivered')">已发放</button>
                            <button class="btn btn-outline-secondary" onclick="loadMyOrders('failed')">失败</button>
                            <button class="btn btn-outline-secondary" onclick="loadMyOrders('cancelled')">已取消</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr><th>订单号</th><th>商品</th><th>数量</th><th>总价</th><th>状态</th><th>时间</th><th class="text-end">操作</th></tr>
                            </thead>
                            <tbody id="orders-table-body">
                                <tr><td colspan="7" class="text-center py-4 text-muted">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer d-flex justify-content-between align-items-center" id="orders-pagination" style="display:none;">
                    <small class="text-muted" id="orders-page-info"></small>
                    <nav><ul class="pagination pagination-sm mb-0" id="orders-pagination-ul"></ul></nav>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- 购买确认模态框 -->
<div class="modal fade" id="purchaseModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-md">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title"><i class="bi bi-cart-check me-2"></i>确认购买</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="purchase-item-id">
                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">商品信息</label>
                    <div class="p-3 border rounded bg-light">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-1" id="purchase-item-name">--</h6>
                                <small class="text-muted" id="purchase-item-category">--</small>
                            </div>
                            <div class="text-end">
                                <div id="purchase-original-price" style="text-decoration: line-through; color: #999; font-size: 0.9rem;"></div>
                                <div class="fs-5 fw-bold text-danger" id="purchase-unit-price">¥0</div>
                                <small class="text-success" id="purchase-discount-badge" style="display:none;"></small>
                            </div>
                        </div>
                        <hr class="my-2">
                        <div class="d-flex justify-content-between small">
                            <span class="text-muted">库存</span>
                            <span id="purchase-stock">--</span>
                        </div>
                        <div class="d-flex justify-content-between small">
                            <span class="text-muted">品质上限</span>
                            <span id="purchase-max-quality">普通</span>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">目标玩家 <span class="text-danger">*</span></label>
                    <select class="form-select form-select-sm" id="purchase-player-select">
                        <option value="">-- 请选择或输入新玩家名 --</option>
                    </select>
                    <div class="mt-2">
                        <div class="input-group input-group-sm">
                            <span class="input-group-text bg-white">或输入新玩家名</span>
                            <input type="text" class="form-control" id="purchase-player-new" placeholder="游戏内玩家名称">
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">购买数量 <span class="text-danger">*</span></label>
                    <div class="input-group input-group-sm" style="max-width: 200px;">
                        <button class="btn btn-outline-secondary" type="button" onclick="adjustPurchaseQty(-1)">-</button>
                        <input type="number" class="form-control text-center" id="purchase-quantity" value="1" min="1" max="100">
                        <button class="btn btn-outline-secondary" type="button" onclick="adjustPurchaseQty(1)">+</button>
                    </div>
                    <div class="form-text" id="purchase-qty-hint">VIP 单次最大数量: 10 个</div>
                </div>

                <div class="p-3 rounded border border-warning bg-warning bg-opacity-10">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold">应付金额</span>
                        <span class="fs-5 fw-bold text-danger" id="purchase-total-price">¥0</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-warning" id="confirm-purchase-btn" onclick="submitPurchase()">
                    <i class="bi bi-cart-check me-1"></i>确认购买
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// ========== 商店数据 ==========
let shopCurrentCategory = '';
let shopCurrentPage = 1;
let shopOrderStatus = '';
let shopVipInfo = null;
let purchaseMaxQty = 10;
let purchaseUnitPrice = 0;
let purchaseDiscountRate = 0;

const qualityNames = ['普通', '优质', '稀有', '史诗', '传说'];
const qualityColors = ['#6c757d', '#17a2b8', '#6f42c1', '#fd7e14', '#dc3545'];

function getQualityBadge(level) {
    const l = parseInt(level) || 0;
    if (l === 0) return '<span class="badge bg-secondary">' + (qualityNames[l] || '普通') + '</span>';
    return `<span class="badge" style="background:${qualityColors[l]||'#6c757d'};color:white">${qualityNames[l] || ''}</span>`;
}

async function loadShopCategories() {
    try {
        const res = await fetch('/app/api.php?action=shop_categories');
        const d = await res.json();
        const container = document.getElementById('shop-categories');
        container.innerHTML = '<button class="btn btn-outline-primary active" onclick="loadShopItems(\'\')">全部</button>';
        if (d.categories && Array.isArray(d.categories)) {
            d.categories.forEach(cat => {
                container.innerHTML += `<button class="btn btn-outline-primary" onclick="loadShopItems('${escapeAttr(cat)}')">${escapeHtml(cat)}</button>`;
            });
        }
    } catch(e) { console.error('loadShopCategories error', e); }
}

async function loadShopItems(category) {
    shopCurrentCategory = category;
    document.querySelectorAll('#shop-categories .btn').forEach(b => b.classList.remove('active'));
    event && event.target && event.target.classList.add('active');

    try {
        let url = '/app/api.php?action=shop_items';
        if (category) url += '&category=' + encodeURIComponent(category);
        const res = await fetch(url);
        const d = await res.json();
        renderShopItems(d.items || []);
    } catch(e) {
        console.error('loadShopItems error', e);
        document.getElementById('shop-items-grid').innerHTML = '<div class="col-12 text-center text-danger py-5">加载商品失败</div>';
    }
}

function searchShopItems() {
    const q = document.getElementById('shop-search-input').value.trim();
    // For now, just filter client-side from loaded items
    const cards = document.querySelectorAll('.shop-item-card');
    let visible = 0;
    cards.forEach(card => {
        const name = (card.dataset.name || '').toLowerCase();
        const code = (card.dataset.code || '').toLowerCase();
        if (!q || name.includes(q.toLowerCase()) || code.includes(q.toLowerCase())) {
            card.style.display = ''; visible++;
        } else {
            card.style.display = 'none';
        }
    });
    if (visible === 0 && q) {
        document.getElementById('shop-items-grid').innerHTML = '<div class="col-12 text-center text-muted py-5"><i class="bi bi-search fs-1 d-block mb-2"></i>未找到匹配的商品</div>';
    }
}

function renderShopItems(items) {
    const grid = document.getElementById('shop-items-grid');
    if (!items.length) {
        grid.innerHTML = '<div class="col-12 text-center text-muted py-5"><i class="bi bi-inbox fs-1 d-block mb-2"></i>暂无商品</div>';
        return;
    }
    grid.innerHTML = items.map(item => {
        const price = parseFloat(item.price) || 0;
        const stock = parseInt(item.stock) || 0;
        const maxQuality = parseInt(item.max_quality) || 0;
        const hasDiscount = shopVipInfo && shopVipInfo.discount > 0;
        const discPrice = hasDiscount ? (price * (1 - shopVipInfo.discount / 100)).toFixed(2) : null;
        const outOfStock = stock <= 0;

        return `
        <div class="col-md-4 col-lg-3 shop-item-card" data-name="${escapeAttr(item.name)}" data-code="${escapeAttr(item.item_code)}">
            <div class="card h-100 ${outOfStock ? 'opacity-50' : ''}">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h6 class="card-title mb-0 fw-bold">${escapeHtml(item.name)}</h6>
                        ${getQualityBadge(maxQuality)}
                    </div>
                    <p class="card-text text-muted small mb-2 font-monospace">${escapeHtml(item.item_code)}</p>
                    <div class="mb-2">
                        ${hasDiscount ? `
                            <span style="text-decoration:line-through;color:#999;font-size:0.85rem;">¥${price}</span>
                            <span class="fs-5 fw-bold text-danger ms-1">¥${discPrice}</span>
                            <span class="badge bg-success ms-1">${shopVipInfo.discount}%OFF</span>
                        ` : `
                            <span class="fs-5 fw-bold text-dark">¥${price}</span>
                        `}
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-auto">
                        <small class="text-muted">库存: <strong>${stock > 999 ? '∞' : stock}</strong></small>
                        <button class="btn btn-sm ${outOfStock ? 'btn-secondary disabled' : 'btn-warning'}"
                            onclick="openPurchaseModal(${item.id}, '${escapeAttr(item.name)}', '${escapeAttr(item.category || '')}', ${price}, ${stock}, ${maxQuantity})"
                            ${outOfStock ? 'disabled' : ''}>
                            <i class="bi bi-cart-plus me-1"></i>${outOfStock ? '缺货' : '购买'}
                        </button>
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');
}

let currentPurchaseItem = null;

function openPurchaseModal(itemId, itemName, category, price, stock, maxQty) {
    currentPurchaseItem = { id: itemId, name: itemName, category: category, price: price, stock: stock };
    purchaseUnitPrice = price;
    purchaseMaxQty = maxQty || (shopVipInfo ? shopVipInfo.max_quantity : 10);
    purchaseDiscountRate = shopVipInfo ? shopVipInfo.discount : 0;

    document.getElementById('purchase-item-id').value = itemId;
    document.getElementById('purchase-item-name').textContent = itemName;
    document.getElementById('purchase-item-category').textContent = category || '--';

    if (purchaseDiscountRate > 0) {
        const dp = (price * (1 - purchaseDiscountRate / 100)).toFixed(2);
        document.getElementById('purchase-original-price').textContent = '原价 ¥' + price;
        document.getElementById('purchase-original-price').style.display = '';
        document.getElementById('purchase-unit-price').textContent = '¥' + dp;
        document.getElementById('purchase-discount-badge').textContent = purchaseDiscountRate + '% 折扣';
        document.getElementById('purchase-discount-badge').style.display = '';
        purchaseUnitPrice = parseFloat(dp);
    } else {
        document.getElementById('purchase-original-price').style.display = 'none';
        document.getElementById('purchase-unit-price').textContent = '¥' + price;
        document.getElementById('purchase-discount-badge').style.display = 'none';
        purchaseUnitPrice = price;
    }

    document.getElementById('purchase-stock').textContent = stock > 999 ? '充足' : stock;
    const mq = shopVipInfo ? shopVipInfo.max_quality : 0;
    document.getElementById('purchase-max-quality').textContent = qualityNames[mq] || '普通';

    document.getElementById('purchase-quantity').value = 1;
    document.getElementById('purchase-quantity').max = purchaseMaxQty;
    document.getElementById('purchase-qty-hint').textContent = 'VIP 单次最大数量: ' + purchaseMaxQty + ' 个';
    updatePurchaseTotal();

    loadPlayerBindings();

    new bootstrap.Modal(document.getElementById('purchaseModal')).show();
}

function adjustPurchaseQty(delta) {
    const el = document.getElementById('purchase-quantity');
    let v = parseInt(el.value) || 1;
    v += delta;
    if (v < 1) v = 1;
    if (v > purchaseMaxQty) v = purchaseMaxQty;
    el.value = v;
    updatePurchaseTotal();
}

document.getElementById('purchase-quantity')?.addEventListener('change', function () {
    let v = parseInt(this.value) || 1;
    if (v < 1) v = 1;
    if (v > purchaseMaxQty) v = purchaseMaxQty;
    this.value = v;
    updatePurchaseTotal();
});

function updatePurchaseTotal() {
    const qty = parseInt(document.getElementById('purchase-quantity').value) || 1;
    const total = (qty * purchaseUnitPrice).toFixed(2);
    document.getElementById('purchase-total-price').textContent = '¥' + total;
}

async function loadPlayerBindings() {
    try {
        const res = await fetch('/app/api.php?action=player_bindings');
        const d = await res.json();
        const sel = document.getElementById('purchase-player-select');
        sel.innerHTML = '<option value="">-- 请选择或输入新玩家名 --</option>';
        if (d.bindings && Array.isArray(d.bindings)) {
            d.bindings.forEach(b => {
                sel.innerHTML += `<option value="${escapeAttr(b.player_name)}">${escapeHtml(b.player_name)}</option>`;
            });
        }
    } catch(e) { console.error('loadPlayerBindings error', e); }
}

async function submitPurchase() {
    const playerId = document.getElementById('purchase-player-select').value;
    const newPlayer = document.getElementById('purchase-player-new').value.trim();
    const quantity = parseInt(document.getElementById('purchase-quantity').value) || 1;
    const playerName = playerId || newPlayer;

    if (!playerName) {
        showToast('请选择或输入目标玩家名', 'error');
        return;
    }
    if (!currentPurchaseItem) return;

    const btn = document.getElementById('confirm-purchase-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>提交中...';

    try {
        const fd = new FormData();
        fd.append('action', 'create_order');
        fd.append('item_id', currentPurchaseItem.id);
        fd.append('player_name', playerName);
        fd.append('quantity', quantity);

        const res = await fetch('/app/api.php', { method: 'POST', body: fd });
        const d = await res.json();

        if (d.error) {
            showToast(d.error, 'error');
        } else if (d.success) {
            showToast(d.message || '订单创建成功！', 'success');
            bootstrap.Modal.getInstance(document.getElementById('purchaseModal')).hide();
            loadShopItems(shopCurrentCategory);
        }
    } catch(e) {
        showToast('网络错误: ' + e.message, 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-cart-check me-1"></i>确认购买';
    }
}

let ordersCurrentPage = 1;

async function loadMyOrders(status) {
    shopOrderStatus = status || '';
    ordersCurrentPage = 1;
    document.querySelectorAll('#shop-orders-panel .btn-group .btn').forEach(b => b.classList.remove('active'));
    if (event && event.target) event.target.classList.add('active');

    await fetchOrders();
}

async function fetchOrders(page) {
    if (page) ordersCurrentPage = page;
    try {
        let url = '/app/api.php?action=my_orders&page=' + ordersCurrentPage;
        if (shopOrderStatus) url += '&status=' + shopOrderStatus;
        const res = await fetch(url);
        const d = await res.json();
        renderOrders(d.orders || [], d.total || 0, d.page_size || 20);
    } catch(e) {
        console.error('fetchOrders error', e);
        document.getElementById('orders-table-body').innerHTML = '<tr><td colspan="7" class="text-center py-3 text-danger">加载订单失败</td></tr>';
    }
}

function renderOrders(orders, total, pageSize) {
    const tb = document.getElementById('orders-table-body');
    if (!orders.length) {
        tb.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted"><i class="bi bi-inbox fs-1 d-block mb-2"></i>暂无订单记录</td></tr>';
        document.getElementById('orders-pagination').style.display = 'none';
        return;
    }

    const statusMap = { pending: '待处理', delivered: '已发放', failed: '失败', cancelled: '已取消' };
    const statusBadge = { pending: 'warning', delivered: 'success', failed: 'danger', cancelled: 'secondary' };

    tb.innerHTML = orders.map(o => `
        <tr>
            <td><code class="small">#${o.id || o.order_id || '--'}</code></td>
            <td>${escapeHtml(o.item_name || '--')}</td>
            <td>${o.quantity || '--'}</td>
            <td class="fw-bold">¥${parseFloat(o.total_price || 0).toFixed(2)}</td>
            <td><span class="badge bg-${statusBadge[o.status] || 'secondary'}">${statusMap[o.status] || o.status}</span></td>
            <td class="text-muted small">${o.created_at || '--'}</td>
            <td class="text-end">
                ${o.status === 'pending' ? `<button class="btn btn-sm btn-outline-danger" onclick="cancelOrder(${o.id})">取消</button>` : ''}
            </td>
        </tr>`).join('');

    const totalPages = Math.ceil(total / pageSize);
    if (totalPages > 1) {
        document.getElementById('orders-pagination').style.display = '';
        document.getElementById('orders-page-info').textContent = `共 ${total} 条，第 ${ordersCurrentPage}/${totalPages} 页`;
        const ul = document.getElementById('orders-pagination-ul');
        ul.innerHTML = '';
        ul.innerHTML += `<li class="page-item ${ordersCurrentPage <= 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="fetchOrders(${ordersCurrentPage - 1});return false;">上一页</a></li>`;
        for (let i = 1; i <= totalPages; i++) {
            ul.innerHTML += `<li class="page-item ${i === ordersCurrentPage ? 'active' : ''}"><a class="page-link" href="#" onclick="fetchOrders(${i});return false;">${i}</a></li>`;
        }
        ul.innerHTML += `<li class="page-item ${ordersCurrentPage >= totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="fetchOrders(${ordersCurrentPage + 1});return false;">下一页</a></li>`;
    } else {
        document.getElementById('orders-pagination').style.display = 'none';
    }
}

async function cancelOrder(orderId) {
    if (!confirm('确定要取消该订单吗？')) return;
    try {
        const fd = new FormData();
        fd.append('action', 'cancel_order');
        fd.append('order_id', orderId);
        const res = await fetch('/app/api.php', { method: 'POST', body: fd });
        const d = await res.json();
        if (d.success) { showToast('订单已取消', 'success'); fetchOrders(); }
        else showToast(d.error || '取消失败', 'error');
    } catch(e) { showToast('网络错误', 'error'); }
}

async function initShopView() {
    try {
        const [catRes, vipRes] = await Promise.all([
            fetch('/app/api.php?action=shop_categories'),
            fetch('/app/api.php?action=vip_info')
        ]);
        const catData = await catRes.json();
        const vipData = await vipRes.json();

        if (vipData.success && vipData.vip_info) {
            shopVipInfo = vipData.vip_info;
        }

        const container = document.getElementById('shop-categories');
        container.innerHTML = '<button class="btn btn-outline-primary active" onclick="loadShopItems(\'\')">全部</button>';
        if (catData.categories && Array.isArray(catData.categories)) {
            catData.categories.forEach(cat => {
                container.innerHTML += `<button class="btn btn-outline-primary" onclick="loadShopItems('${escapeAttr(cat)}')">${escapeHtml(cat)}</button>`;
            });
        }

        loadShopItems('');
        loadMyOrders('');
    } catch(e) { console.error('initShopView error', e); }
}
</script>
