<!-- ========== VIP中心 ========== -->
<div id="view-vip" class="view-panel">
    <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
            <h4><i class="bi bi-gem me-2 text-primary"></i>VIP 中心</h4>
            <p class="text-muted mb-0 small">查看会员权益、等级对比、VIP 管理</p>
        </div>
    </div>

    <!-- 当前VIP状态卡片 -->
    <div class="card mb-4 border-primary" id="vip-status-card">
        <div class="card-header bg-gradient text-white" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
            <i class="bi bi-star-fill me-2"></i>当前 VIP 状态
        </div>
        <div class="card-body">
            <div class="row align-items-center g-4">
                <div class="col-md-auto text-center">
                    <div id="vip-level-icon" class="display-3 fw-bold text-primary">0</div>
                    <div class="small text-muted mt-1" id="vip-level-name">普通用户</div>
                </div>
                <div class="col-md">
                    <div class="row g-3 mb-3">
                        <div class="col-sm-6 col-md-4">
                            <label class="form-label small text-muted mb-1">到期时间</label>
                            <div class="fw-bold" id="vip-expiry">永久</div>
                        </div>
                        <div class="col-sm-6 col-md-4">
                            <label class="form-label small text-muted mb-1">每日购买次数</label>
                            <div class="fw-bold" id="vip-daily-limit">5 次</div>
                        </div>
                        <div class="col-sm-6 col-md-4">
                            <label class="form-label small text-muted mb-1">单次最大数量</label>
                            <div class="fw-bold" id="vip-max-qty">10 个</div>
                        </div>
                    </div>

                    <div class="mb-2">
                        <div class="d-flex justify-content-between small mb-1">
                            <span>距离下一等级</span>
                            <span id="vip-progress-text">--</span>
                        </div>
                        <div class="progress" style="height: 8px;">
                            <div class="progress-bar bg-gradient" id="vip-progress-bar"
                                style="width: 0%; background: linear-gradient(90deg, #667eea, #764ba2);"
                                role="progressbar"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-2 mt-2" id="vip-benefits-row">
                <div class="col-6 col-md-4"><div class="text-center p-2 rounded border"><i class="bi bi-calendar-check fs-4 text-info d-block mb-1"></i><small class="text-muted">每日次数</small><div class="fw-bold" id="vip-benefit-daily">5次</div></div></div>
                <div class="col-6 col-md-4"><div class="text-center p-2 rounded border"><i class="bi bi-stack fs-4 text-warning d-block mb-1"></i><small class="text-muted">单次数量</small><div class="fw-bold" id="vip-benefit-maxqty">10个</div></div></div>
                <div class="col-6 col-md-4"><div class="text-center p-2 rounded border"><i class="bi bi-gem fs-4 text-danger d-block mb-1"></i><small class="text-muted">最高品质</small><div class="fw-bold" id="vip-benefit-quality">普通</div></div></div>
            </div>
        </div>
    </div>

    <!-- VIP等级对比表 -->
    <div class="card mb-4">
        <div class="card-header"><i class="bi bi-table me-2"></i>VIP 等级对比</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr><th>等级</th><th>名称</th><th>每日购买次数</th><th>单次最大数量</th><th>最高品质</th></tr>
                    </thead>
                    <tbody id="vip-compare-table">
                        <tr data-vip-level="0"><td><span class="badge bg-secondary fs-6 px-3 py-1">Lv.0</span></td><td>普通用户</td><td>5 次</td><td>10 个</td><td><span class="badge bg-secondary">普通</span></td></tr>
                        <tr data-vip-level="1"><td><span class="badge" style="background:#cd7f32;color:white;fs-6 px-3 py-1;">Lv.1</span></td><td>青铜会员</td><td>10 次</td><td>20 个</td><td><span class="badge" style="background:#17a2b8;color:white">优质</span></td></tr>
                        <tr data-vip-level="2"><td><span class="badge" style="background:#c0c0c0;color:#333;fs-6 px-3 py-1;">Lv.2</span></td><td>白银会员</td><td>15 次</td><td>30 个</td><td><span class="badge" style="background:#6f42c1;color:white">稀有</span></td></tr>
                        <tr data-vip-level="3"><td><span class="badge bg-warning text-dark fs-6 px-3 py-1">Lv.3</span></td><td>黄金会员</td><td>20 次</td><td>50 个</td><td><span class="badge" style="background:#fd7e14;color:white">史诗</span></td></tr>
                        <tr data-vip-level="4"><td><span class="badge" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;fs-6 px-3 py-1;">Lv.4</span></td><td>钻石会员</td><td>30 次</td><td>100 个</td><td><span class="badge" style="background:#dc3545;color:white">传说</span></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 管理员功能区（仅管理员可见） -->
    <div class="card mb-4" id="vip-admin-section" style="display:none;">
        <div class="card-header bg-dark text-white"><i class="bi bi-shield-lock me-2"></i>管理员功能</div>
        <div class="card-body">
            <ul class="nav nav-tabs mb-3" id="vipAdminTabs" role="tablist">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#vip-set-panel" role="tab">设置用户VIP</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#vip-list-panel" role="tab">VIP 用户列表</button></li>
            </ul>

            <div class="tab-content">

                <!-- 设置用户VIP -->
                <div class="tab-pane fade show active" id="vip-set-panel" role="tabpanel">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-muted">目标用户名 <span class="text-danger">*</span></label>
                            <select class="form-select" id="set-vip-username">
                                <option value="">-- 选择用户 --</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-muted">VIP 等级 <span class="text-danger">*</span></label>
                            <select class="form-select" id="set-vip-level">
                                <option value="0">Lv.0 - 普通用户</option>
                                <option value="1">Lv.1 - 青铜会员</option>
                                <option value="2">Lv.2 - 白银会员</option>
                                <option value="3">Lv.3 - 黄金会员</option>
                                <option value="4">Lv.4 - 钻石会员</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-muted">有效期（天）</label>
                            <input type="number" class="form-control" id="set-vip-days" placeholder="如30天，留空为永久" min="1" value="30">
                        </div>
                        <div class="col-12">
                            <button class="btn btn-primary" onclick="submitSetVip()">
                                <i class="bi bi-gem me-1"></i>设置 VIP
                            </button>
                        </div>
                    </div>
                </div>

                <!-- VIP用户列表 -->
                <div class="tab-pane fade" id="vip-list-panel" role="tabpanel">
                    <div class="d-flex justify-content-end mb-2">
                        <button class="btn btn-sm btn-outline-secondary" onclick="loadVipList()"><i class="bi bi-arrow-repeat me-1"></i>刷新</button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr><th>用户名</th><th>当前等级</th><th>到期时间</th><th>状态</th><th class="text-end">操作</th></tr>
                            </thead>
                            <tbody id="vip-user-list-body">
                                <tr><td colspan="5" class="text-center py-3 text-muted">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
const vipLevels = [
    { level: 0, name: '普通用户', dailyLimit: 5, maxQty: 10, maxQuality: 0, color: '#6b7280' },
    { level: 1, name: '青铜会员', dailyLimit: 10, maxQty: 20, maxQuality: 1, color: '#cd7f32' },
    { level: 2, name: '白银会员', dailyLimit: 15, maxQty: 30, maxQuality: 2, color: '#c0c0c0' },
    { level: 3, name: '黄金会员', dailyLimit: 20, maxQty: 50, maxQuality: 3, color: '#f59e0b' },
    { level: 4, name: '钻石会员', dailyLimit: 30, maxQty: 100, maxQuality: 4, color: '#667eea' }
];

const qualityNames = ['普通', '优质', '稀有', '史诗', '传说'];

async function initVipView() {
    try {
        const res = await fetch('/app/api.php?action=vip_info');
        const d = await res.json();
        if (d.success && d.vip_info) {
            renderVipStatus(d.vip_info);
            highlightCurrentLevel(d.vip_info.level);
        }
    } catch(e) { console.error('initVipView error', e); }

    try {
        const userRes = await fetch('/app/api.php?action=user_info');
        const ud = await userRes.json();
        if (ud.success && (ud.user || ud.data) && (ud.user?.role === 'admin' || ud.data?.role === 'admin')) {
            document.getElementById('vip-admin-section').style.display = '';
            loadVipList();
            loadUserList();
        }
    } catch(e) { console.error('user_info error', e); }
}

async function loadUserList() {
    try {
        const res = await fetch('/app/api.php?action=user_list');
        const d = await res.json();
        if (d.success && d.users) {
            renderUserSelect(d.users);
        }
    } catch(e) {
        console.error('loadUserList error', e);
    }
}

function renderUserSelect(users) {
    const select = document.getElementById('set-vip-username');
    select.innerHTML = '<option value="">-- 选择用户 --</option>';
    users.forEach(u => {
        const option = document.createElement('option');
        option.value = u.username;
        option.textContent = `${u.username} (${u.name})`;
        select.appendChild(option);
    });
}

function renderVipStatus(info) {
    const lvl = parseInt(info.level) || 0;
    const vipData = vipLevels[lvl] || vipLevels[0];
    const iconEl = document.getElementById('vip-level-icon');
    iconEl.textContent = 'Lv.' + lvl;

    document.getElementById('vip-level-name').textContent = vipData.name;
    document.getElementById('vip-expiry').textContent = info.expiry || '永久';
    document.getElementById('vip-daily-limit').textContent = vipData.dailyLimit + ' 次';
    document.getElementById('vip-max-qty').textContent = vipData.maxQty + ' 个';

    document.getElementById('vip-benefit-daily').textContent = vipData.dailyLimit + '次';
    document.getElementById('vip-benefit-maxqty').textContent = vipData.maxQty + '个';
    document.getElementById('vip-benefit-quality').textContent = qualityNames[vipData.maxQuality] || '普通';

    iconEl.style.color = vipData.color;

    const progressText = document.getElementById('vip-progress-text');
    const progressBar = document.getElementById('vip-progress-bar');

    if (lvl >= 4) {
        progressText.textContent = '已达到最高等级';
        progressBar.style.width = '100%';
    } else {
        progressText.textContent = `下一等级: ${vipLevels[lvl+1].name}`;
        progressBar.style.width = ((lvl / 4) * 100) + '%';
    }
}

function highlightCurrentLevel(currentLevel) {
    const rows = document.querySelectorAll('#vip-compare-table tr[data-vip-level]');
    rows.forEach(row => {
        row.classList.remove('table-primary');
        if (parseInt(row.dataset.vipLevel) === currentLevel) {
            row.classList.add('table-primary');
        }
    });
}

async function loadVipList() {
    try {
        const res = await fetch('/app/api.php?action=vip_list');
        const d = await res.json();
        renderVipUserList(d.users || []);
    } catch(e) {
        console.error('loadVipList error', e);
        document.getElementById('vip-user-list-body').innerHTML = '<tr><td colspan="5" class="text-center py-3 text-danger">加载失败</td></tr>';
    }
}

function renderVipUserList(users) {
    const tb = document.getElementById('vip-user-list-body');
    if (!users.length) {
        tb.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">暂无 VIP 用户</td></tr>';
        return;
    }

    tb.innerHTML = users.map(u => {
        const lvl = parseInt(u.vip_level) || 0;
        const vd = vipLevels[lvl] || vipLevels[0];
        const isExpired = u.is_expired;
        const statusBadge = isExpired
            ? '<span class="badge bg-secondary">已过期</span>'
            : '<span class="badge bg-success">有效</span>';

        return `
        <tr>
            <td><code>${escapeHtml(u.username)}</code></td>
            <td><span class="badge" style="background:${vd.color};color:${lvl===2?'#333':'white'}">${vd.name}</span></td>
            <td class="small">${u.expiry_date || '永久'}</td>
            <td>${statusBadge}</td>
            <td class="text-end">
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-warning" onclick="editVipUser('${escapeAttr(u.username)}',${lvl})" title="修改等级"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-outline-danger" onclick="removeVipUser('${escapeAttr(u.username)}')" title="取消VIP"><i class="bi bi-x-circle"></i></button>
                </div>
            </td>
        </tr>`;
    }).join('');
}

function editVipUser(username, currentLevel) {
    const select = document.getElementById('set-vip-username');
    select.value = username;
    document.getElementById('set-vip-level').value = currentLevel;
    document.getElementById('set-vip-days').value = '';
    document.querySelectorAll('#vipAdminTabs .nav-link')[0].click();
    showToast(`正在编辑 ${username} 的 VIP 设置`, 'info');
}

async function removeVipUser(username) {
    if (!confirm(`确定要取消 ${username} 的 VIP 权限吗？`)) return;
    try {
        const fd = new FormData();
        fd.append('action', 'set_vip');
        fd.append('username', username);
        fd.append('level', '0');
        fd.append('expiry_days', '0');
        const res = await fetch('/app/api.php', { method: 'POST', body: fd });
        const d = await res.json();
        if (d.success) { showToast(`${username} 的 VIP 已取消`, 'success'); loadVipList(); }
        else showToast(d.error || '操作失败', 'error');
    } catch(e) { showToast('网络错误', 'error'); }
}

async function submitSetVip() {
    const username = document.getElementById('set-vip-username').value;
    const level = document.getElementById('set-vip-level').value;
    const days = document.getElementById('set-vip-days').value.trim();

    if (!username) { showToast('请选择目标用户', 'error'); return; }

    try {
        const fd = new FormData();
        fd.append('action', 'set_vip');
        fd.append('username', username);
        fd.append('level', level);
        fd.append('expiry_days', days || '0');

        const res = await fetch('/app/api.php', { method: 'POST', body: fd });
        const d = await res.json();

        if (d.success) {
            showToast(d.message || 'VIP 设置成功！', 'success');
            document.getElementById('set-vip-username').value = '';
            loadVipList();
        } else {
            showToast(d.error || '设置失败', 'error');
        }
    } catch(e) { showToast('网络错误: ' + e.message, 'error'); }
}

// 页面加载时初始化
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initVipView);
} else {
    initVipView();
}
</script>
