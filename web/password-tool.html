<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户设置工具</title>
    <link rel="stylesheet" href="static/lib/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/lib/bootstrap/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container-card {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            padding: 40px;
        }
        .btn-copy {
            transition: all 0.2s;
        }
        .btn-copy:hover {
            transform: translateY(-2px);
        }
        .hash-output {
            font-family: Consolas, monospace;
            font-size: 13px;
            word-break: break-all;
            background: #f3f4f6;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container-card">
        <div class="text-center mb-4">
            <i class="bi bi-person-circle fs-1 text-primary mb-3"></i>
            <h2 class="fw-bold">用户设置工具</h2>
            <p class="text-muted">用于设置 Factorio Server Pro 的用户信息和密码</p>
        </div>
        
        <div class="mb-4">
            <label class="form-label fw-bold">用户名</label>
            <input type="text" class="form-control" id="username" placeholder="请输入用户名" value="admin">
        </div>
        
        <div class="mb-4">
            <label class="form-label fw-bold">显示名称</label>
            <input type="text" class="form-control" id="displayName" placeholder="请输入显示名称" value="管理员">
        </div>
        
        <div class="mb-4">
            <label class="form-label fw-bold">输入新密码</label>
            <div class="input-group">
                <input type="password" class="form-control" id="password" placeholder="请输入密码">
                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>
        
        <div class="mb-4">
            <label class="form-label fw-bold">确认密码</label>
            <input type="password" class="form-control" id="confirmPassword" placeholder="再次输入密码">
        </div>
        
        <button class="btn btn-primary w-100 py-3 mb-4" id="saveBtn">
            <i class="bi bi-save me-2"></i>保存用户设置
        </button>
        
        <div id="resultArea" class="d-none">
            <div class="alert alert-success" id="successMessage">
                <h6 class="alert-heading fw-bold"><i class="bi bi-check-circle me-2"></i>保存成功</h6>
                <p class="mb-0">用户设置已成功保存，您可以返回登录页面。</p>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <a href="login.html" class="btn btn-link">
                <i class="bi bi-arrow-left me-1"></i>返回登录
            </a>
        </div>
    </div>

    <script src="static/lib/jquery-3.6.0.min.js"></script>
    <script src="static/lib/bootstrap/js/bootstrap.bundle.js"></script>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            const pwd = document.getElementById('password');
            const icon = this.querySelector('i');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                pwd.type = 'password';
                icon.className = 'bi bi-eye';
            }
        });
        
        document.getElementById('saveBtn').addEventListener('click', async function() {
            const username = document.getElementById('username').value.trim();
            const displayName = document.getElementById('displayName').value.trim();
            const pwd = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (!username) {
                alert('请输入用户名');
                return;
            }
            
            if (!displayName) {
                alert('请输入显示名称');
                return;
            }
            
            if (pwd && pwd !== confirm) {
                alert('两次输入的密码不一致');
                return;
            }
            
            if (pwd && pwd.length < 6) {
                alert('密码长度至少 6 位');
                return;
            }
            
            const saveBtn = this;
            const originalText = saveBtn.innerHTML;
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<div class="loading"></div> 保存中...';
            
            try {
                const res = await fetch('api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `action=update_user&username=${encodeURIComponent(username)}&display_name=${encodeURIComponent(displayName)}&password=${encodeURIComponent(pwd)}`
                });
                
                const d = await res.json();
                
                if (d.success) {
                    document.getElementById('resultArea').classList.remove('d-none');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    alert('保存失败: ' + (d.error || '未知错误'));
                }
            } catch (e) {
                alert('网络错误: ' + e.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
